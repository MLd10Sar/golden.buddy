
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoldenBuddy AI - Your Walking Companion</title>
  
  <!-- Tailwind for Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel Standalone to compile TSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes scaleUp {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slideIn { animation: slideIn 0.4s ease-out forwards; }
    .animate-scaleUp { animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #fbbf24;
      border-radius: 10px;
    }
  </style>

  <script>
    // Polyfill process for Gemini SDK in browser
    window.process = { env: { API_KEY: "" } };
  </script>

  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.41.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body class="bg-amber-50 text-slate-900 overflow-x-hidden">
  <div id="root"></div>
  
  <!-- 
    Removing data-type="module" is CRITICAL for GitHub Pages.
    This allows Babel to run the script without the browser checking MIME types of imported files.
  -->
  <script 
    type="text/babel" 
    data-presets="typescript,react" 
    src="./index.tsx">
  </script>
</body>
</html>
