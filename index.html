
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GoldenBuddy - Neighborhood Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior-y: none;
      background-color: #0f172a;
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    .safe-top { padding-top: var(--safe-top); }
    .safe-bottom { padding-bottom: calc(var(--safe-bottom) + 1rem); }
    
    .animate-spring { animation: spring 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes spring {
      from { transform: scale(0.95) translateY(10px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    
    .clay-card {
      background: white;
      border-radius: 3rem;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1), inset 0 -4px 0 rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .clay-button {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    }
    .clay-button:active { transform: scale(0.95); box-shadow: 0 4px 10px -2px rgba(0,0,0,0.1); }
  </style>
  <script>window.process = { env: { API_KEY: "" } };</script>
  <script type="importmap">
{

    "react": "https://esm.sh/react@19.0.0",

    "@google/genai": "https://esm.sh/@google/genai@1.41.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module" data-presets="typescript,react" src="./index.tsx"></script>
</body>
</html>
