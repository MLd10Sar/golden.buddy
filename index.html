
<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GoldenBuddy - Neighborhood Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior-y: none;
      background-color: #0f172a;
    }
    .safe-top { padding-top: var(--safe-top); }
    .safe-bottom { padding-bottom: calc(var(--safe-bottom) + 1.5rem); }
    
    .animate-spring { animation: spring 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes spring {
      from { transform: scale(0.92); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
    .shadow-clay { shadow: 0 10px 30px -10px rgba(0,0,0,0.1), inset 0 2px 4px rgba(255,255,255,0.8); }
  </style>
  <script>window.process = { env: { API_KEY: "" } };</script>
