
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GoldenBuddy - Neighborhood Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior-y: none;
      background-color: #020617; /* Darkest Slate */
      margin: 0; padding: 0;
      height: 100%; overflow: hidden;
    }
    .safe-top { padding-top: var(--safe-top); }
    .safe-bottom { padding-bottom: calc(var(--safe-bottom) + 1rem); }
    
    .animate-spring-up { animation: springUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes springUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .clay-card {
      background: #ffffff;
      border-radius: 2.5rem;
      box-shadow: 0 20px 50px -10px rgba(0,0,0,0.3), inset 0 -4px 0 rgba(0,0,0,0.1);
    }

    .neon-glow {
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
    }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <script>window.process = { env: { API_KEY: "" } };</script>

    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>

</body>
</html>
